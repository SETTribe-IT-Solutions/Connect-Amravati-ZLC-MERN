spring.application.name=Amravati-Connect-ZLC-MERN

# Database Configuration (Render Env Vars with Local Fallbacks)
spring.datasource.url=${DB_URLS:jdbc:mysql://localhost:3306/login_database_amravati_connect}
spring.datasource.username=${DB_USERNAMES:root}
spring.datasource.password=${DB_PASSWORDS:}

# Server Port (Render provides PORT, default to 8080 locally)
server.port=${PORT:8080}

# Security Configuration (Render Env Var with default)
amravati.app.jwtSecret=${AMRAVATI_APP_JWTSECRET:Z3JlYXRlc3Qtc2VjcmV0LWtleS1mb3Itamp3dC1hcHAtZGV2ZWxvcG1lbnQ=}

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
