server.port=${PORT:8080}
spring.datasource.url=${DB_URLS}
spring.datasource.username=${DB_USERNAMES}
spring.datasource.password=${DB_PASSWORDS}
spring.jpa.hibernate.ddl-auto=update
amravati.app.jwtSecret=${AMRAVATI_APP_JWTSECRET:default_jwt_secret_change_in_production}
amravati.app.frontendUrl=${FRONTEND_URL:https://amravati-connect.onrender.com}
amravati.app.cookie.secure=true
amravati.app.cookie.sameSite=None
